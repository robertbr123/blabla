name: tecnico_mobile
description: App mobile do técnico Ondeline — offline-first, GPS + câmera + FCM.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP + auth
  dio: ^5.7.0
  shared_preferences: ^2.3.3

  # Offline DB (drift + SQLite)
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # State / nav
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.1

  # Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Câmera + GPS
  image_picker: ^1.1.2
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.19.0
  connectivity_plus: ^6.1.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
