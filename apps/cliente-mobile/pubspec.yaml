name: cliente_mobile
description: App mobile do cliente final Ondeline — fatura, plano, OS e chat.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP + auth
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0

  # State / nav
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.1

  # Push (opcional — graceful se firebase_options.dart nao existir)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # UI
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
