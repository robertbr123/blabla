name: cliente_mobile
description: App mobile do cliente final Ondeline — fatura, plano, OS e chat.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP + auth
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0

  # State / nav
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.1

  # Preferencias (cache last-known + theme mode)
  shared_preferences: ^2.3.3

  # Abrir URLs externas (boleto PDF, share)
  url_launcher: ^6.3.1

  # Push (opcional — graceful se firebase_options.dart nao existir)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  # Exibe notificacao quando o app esta em FOREGROUND (FCM nao mostra sozinho).
  flutter_local_notifications: ^18.0.1

  # UI
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  share_plus: ^10.1.2
  path_provider: ^2.1.5

  # Home screen widget (Android primeiro; iOS WidgetKit numa onda futura)
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  # Adaptive icon (Android): fundo azul marinho da logo, foreground = imagem
  adaptive_icon_background: "#0B1F3A"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21
