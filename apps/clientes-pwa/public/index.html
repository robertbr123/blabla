<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ondeline — Aplicativo do cliente</title>
  <meta name="description" content="Acompanhe seu plano, faturas e suporte da Ondeline no aplicativo.">
  <meta name="theme-color" content="#0B1F3A">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230B1F3A'/%3E%3Cpath d='M30 60 Q50 30 70 60' stroke='%2300C2A8' stroke-width='8' fill='none' stroke-linecap='round'/%3E%3Ccircle cx='50' cy='70' r='6' fill='%2300C2A8'/%3E%3C/svg%3E">
  <style>
    :root {
      --navy: #0B1F3A;
      --teal: #00C2A8;
      --bg: #F4F6FA;
      --text: #1A2540;
      --muted: #5B6884;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: white; border-radius: 24px; padding: 40px 32px; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(11, 31, 58, 0.08); text-align: center; }
    .logo { width: 72px; height: 72px; background: var(--navy); border-radius: 18px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; }
    h1 { font-size: 24px; margin: 0 0 8px; letter-spacing: -0.02em; }
    .lead { color: var(--muted); font-size: 15px; line-height: 1.5; margin: 0 0 28px; }
    .stores { display: flex; flex-direction: column; gap: 12px; }
    a.btn { display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; padding: 14px 20px; border-radius: 12px; font-weight: 600; font-size: 15px; transition: transform 120ms ease, box-shadow 120ms ease; }
    a.btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(11, 31, 58, 0.12); }
    a.btn.primary { background: var(--navy); color: white; }
    a.btn.outline { background: white; color: var(--navy); border: 1.5px solid #E2E8F2; }
    .foot { margin-top: 28px; font-size: 12px; color: var(--muted); }
    .foot a { color: var(--muted); text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 100 100" fill="none">
        <path d="M20 70 Q50 30 80 70" stroke="#00C2A8" stroke-width="8" fill="none" stroke-linecap="round"/>
        <circle cx="50" cy="80" r="6" fill="#00C2A8"/>
      </svg>
    </div>
    <h1>Aplicativo Ondeline</h1>
    <p class="lead">Acompanhe seu plano, suas faturas, abra chamados e copie o PIX em poucos toques.</p>
    <div class="stores">
      <a class="btn primary" id="play"
         href="https://play.google.com/store/apps/details?id=dev.robertbr.cliente_mobile">
        Baixar na Google Play
      </a>
      <a class="btn outline" id="appstore"
         href="https://apps.apple.com/app/id000000000">
        Baixar na App Store
      </a>
    </div>
    <p class="foot">
      Já é cliente? <a href="https://ondelinetelecom.com.br" target="_blank" rel="noopener">Site oficial</a>
    </p>
  </main>
  <script>
    // Detecta plataforma e destaca o store correto na ordem.
    (function () {
      var ua = navigator.userAgent || '';
      var isiOS = /iphone|ipad|ipod/i.test(ua);
      var play = document.getElementById('play');
      var appstore = document.getElementById('appstore');
      if (isiOS && play && appstore && play.parentNode) {
        // No iOS, App Store primeiro.
        play.parentNode.insertBefore(appstore, play);
        appstore.classList.remove('outline'); appstore.classList.add('primary');
        play.classList.remove('primary'); play.classList.add('outline');
      }
    })();
  </script>
</body>
</html>
