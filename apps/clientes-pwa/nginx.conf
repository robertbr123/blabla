server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Logs no stdout/stderr pra Docker capturar.
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # /.well-known/assetlinks.json — Android App Links.
    # Tem extensao .json entao nginx ja serve com application/json.
    location = /.well-known/assetlinks.json {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # /.well-known/apple-app-site-association — iOS Universal Links.
    # SEM extensao, entao precisamos forcar o MIME (Apple exige application/json).
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # Bloqueia o resto dos dotfiles (.git, .env, .htaccess, etc.), mas mantem
    # a excecao acima pra /.well-known/.
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    # Tudo mais (incluindo /faturas, /os/:id, /notificacoes) cai na landing
    # quando o app NAO esta instalado. Quando esta instalado, o SO intercepta
    # esses caminhos antes do browser chegar aqui.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
