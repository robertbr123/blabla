name: blabla

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    container_name: blabla-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blabla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}
      POSTGRES_DB: ${POSTGRES_DB:-blabla}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port mapping in prod — only docker network.
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-blabla}", "-d", "${POSTGRES_DB:-blabla}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: blabla-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *default-logging

  api:
    image: ghcr.io/${GHCR_OWNER}/blabla-api:latest
    container_name: blabla-api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    logging: *default-logging

  worker:
    image: ghcr.io/${GHCR_OWNER}/blabla-api:latest
    container_name: blabla-worker
    command: ["celery", "-A", "ondeline_api.workers.celery_app:celery_app", "worker", "-Q", "default,llm,sgp,notifications", "--concurrency=4", "--loglevel=info"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A ondeline_api.workers.celery_app:celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging

  beat:
    image: ghcr.io/${GHCR_OWNER}/blabla-api:latest
    container_name: blabla-beat
    command: ["celery", "-A", "ondeline_api.workers.celery_app:celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -q celery /proc/1/cmdline"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging: *default-logging

  dashboard:
    image: ghcr.io/${GHCR_OWNER}/blabla-dashboard:latest
    container_name: blabla-dashboard
    env_file:
      - .env
    ports:
      - "3002:3000"
    depends_on:
      - api
    restart: unless-stopped
    logging: *default-logging

  tecnico-pwa:
    image: ghcr.io/${GHCR_OWNER}/blabla-tecnico-pwa:latest
    container_name: blabla-tecnico-pwa
    env_file:
      - .env
    ports:
      - "3003:3000"
    depends_on:
      - api
    restart: unless-stopped
    logging: *default-logging

  evolution-api:
    image: evoapicloud/evolution-api:v1.8.7
    container_name: blabla-evolution
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - evolution_data:/evolution/instances
    environment:
      - SERVER_URL=${EVOLUTION_SERVER_URL}
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_KEY}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-blabla}:${POSTGRES_PASSWORD}@postgres:5432/evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - DEL_INSTANCE=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    restart: unless-stopped
    logging: *default-logging

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: blabla-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      - DOCKER_CONFIG=/
      - DOCKER_API_VERSION=1.41
    command: --interval 30 --cleanup
    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  evolution_data:
