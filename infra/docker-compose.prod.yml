name: ondeline-v2

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ondeline-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ondeline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ondeline}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port mapping in prod — only docker network.
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-ondeline}", "-d", "${POSTGRES_DB:-ondeline}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: ondeline-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *default-logging

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: ondeline-api
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Nginx Proxy Manager terminates TLS and proxies to this port over the docker network.
    # Also bind on host loopback so the Next.js dashboard/PWA (running on the host)
    # can reach the API via INTERNAL_API_URL=http://127.0.0.1:8000. 127.0.0.1 binding
    # keeps it off the public internet — NPM is the only external entry point.
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    logging: *default-logging

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: ondeline-worker
    command: ["celery", "-A", "ondeline_api.workers.celery_app:celery_app", "worker", "-Q", "default,llm,sgp,notifications", "--concurrency=4", "--loglevel=info"]
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A ondeline_api.workers.celery_app:celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging

  beat:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: ondeline-beat
    command: ["celery", "-A", "ondeline_api.workers.celery_app:celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat-schedule && find /tmp/celerybeat-schedule -mmin -2 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
