name: blabla

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# Config comum aos 4 processos do GenieACS (cwmp/nbi/fs/ui) — todos rodam a
# mesma imagem, mudando so o `command`. Atras do profile "genieacs" pra NAO
# subir junto no deploy normal; sobe com:
#   docker compose --profile genieacs up -d --build
x-genieacs: &genieacs-common
  build:
    context: ./genieacs
  image: blabla-genieacs:local
  profiles: ["genieacs"]
  environment:
    GENIEACS_MONGODB_CONNECTION_URL: mongodb://genieacs-mongo:27017/genieacs
    GENIEACS_UI_JWT_SECRET: ${GENIEACS_UI_JWT_SECRET:?GENIEACS_UI_JWT_SECRET required in .env}
  depends_on:
    genieacs-mongo:
      condition: service_healthy
  # Imagem propria buildada — Watchtower nao mexe (igual Evolution).
  labels:
    - "com.centurylinklabs.watchtower.enable=false"
  restart: unless-stopped
  logging: *default-logging

services:
  postgres:
    image: postgres:16-alpine
    container_name: blabla-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blabla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}
      POSTGRES_DB: ${POSTGRES_DB:-blabla}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port mapping in prod — only docker network.
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-blabla}", "-d", "${POSTGRES_DB:-blabla}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: blabla-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *default-logging

  api:
    image: ghcr.io/${GHCR_OWNER}/blabla-api:latest
    container_name: blabla-api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - cliente_fotos:/tmp/ondeline_cliente_fotos
      - os_fotos:/tmp/ondeline_os_fotos
    restart: unless-stopped
    logging: *default-logging

  worker:
    image: ghcr.io/${GHCR_OWNER}/blabla-api:latest
    container_name: blabla-worker
    command: ["celery", "-A", "ondeline_api.workers.celery_app:celery_app", "worker", "-Q", "default,llm,sgp,notifications,asr", "--concurrency=4", "--loglevel=info"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - cliente_fotos:/tmp/ondeline_cliente_fotos
      - os_fotos:/tmp/ondeline_os_fotos
    healthcheck:
      test: ["CMD-SHELL", "celery -A ondeline_api.workers.celery_app:celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging

  beat:
    image: ghcr.io/${GHCR_OWNER}/blabla-api:latest
    container_name: blabla-beat
    command: ["celery", "-A", "ondeline_api.workers.celery_app:celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -q celery /proc/1/cmdline"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging: *default-logging

  dashboard:
    image: ghcr.io/${GHCR_OWNER}/blabla-dashboard:latest
    container_name: blabla-dashboard
    env_file:
      - .env
    # Bind so localhost — acessivel apenas via nginx (proxy_pass http://127.0.0.1:3002)
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      - api
    restart: unless-stopped
    logging: *default-logging

  tecnico-pwa:
    image: ghcr.io/${GHCR_OWNER}/blabla-tecnico-pwa:latest
    container_name: blabla-tecnico-pwa
    env_file:
      - .env
    # Bind so localhost — acessivel apenas via nginx (proxy_pass http://127.0.0.1:3003)
    ports:
      - "127.0.0.1:3003:3000"
    depends_on:
      - api
    restart: unless-stopped
    logging: *default-logging

  # Landing + /.well-known/ pra clientes.ondeline.com.br.
  # Mini Next.js (mesmo padrao do tecnico-pwa): serve assetlinks.json (Android
  # App Links) e apple-app-site-association (iOS Universal Links) com MIME
  # correto via next.config.ts headers(), alem da landing fallback quando o
  # app cliente nao esta instalado.
  clientes-pwa:
    image: ghcr.io/${GHCR_OWNER}/blabla-clientes-pwa:latest
    container_name: blabla-clientes-pwa
    # Bind so localhost — Nginx Proxy Manager roteia
    # clientes.ondeline.com.br -> 127.0.0.1:3004
    ports:
      - "127.0.0.1:3004:3000"
    restart: unless-stopped
    logging: *default-logging

  evolution-api:
    profiles: ["evolution"]
    image: evoapicloud/evolution-api:latest
    container_name: blabla-evolution
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - evolution_data:/evolution/instances
    environment:
      - SERVER_URL=${EVOLUTION_SERVER_URL}
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_KEY}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-blabla}:${POSTGRES_PASSWORD}@postgres:5432/evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - DEL_INSTANCE=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    restart: unless-stopped
    logging: *default-logging

  # ── GenieACS (TR-069) — profile "genieacs", nao sobe no deploy normal ──
  # MongoDB dedicado (GenieACS exige Mongo; nada a ver com o postgres da app).
  genieacs-mongo:
    image: mongo:6
    container_name: blabla-genieacs-mongo
    profiles: ["genieacs"]
    volumes:
      - genieacs_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    restart: unless-stopped
    logging: *default-logging

  # cwmp: porta PUBLICA — as ONUs no campo conectam aqui (TR-069 Inform).
  # ATENCAO seguranca: sem TLS/auth neste estagio (igual o spike). Antes de
  # apontar a base real, ligar TLS + auth por ONU + firewall em 7547.
  genieacs-cwmp:
    <<: *genieacs-common
    container_name: blabla-genieacs-cwmp
    command: ["genieacs-cwmp"]
    ports:
      - "7547:7547"
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(7547,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # nbi: API REST — SEM porta no host. So a `api` acessa via rede docker
  # (http://genieacs-nbi:7557). E onde o backend vai integrar.
  genieacs-nbi:
    <<: *genieacs-common
    container_name: blabla-genieacs-nbi
    command: ["genieacs-nbi"]
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(7557,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # fs: file server — CPEs baixam firmware aqui (so usado em upgrade de
  # firmware; deixo exposto desde ja pra nao precisar mexer depois).
  genieacs-fs:
    <<: *genieacs-common
    container_name: blabla-genieacs-fs
    command: ["genieacs-fs"]
    ports:
      - "7567:7567"
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(7567,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ui: painel admin — so localhost, acessivel via nginx (proxy_pass
  # http://127.0.0.1:3005). Mesmo padrao do dashboard/pwa.
  genieacs-ui:
    <<: *genieacs-common
    container_name: blabla-genieacs-ui
    command: ["genieacs-ui"]
    ports:
      - "127.0.0.1:3005:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3000,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: blabla-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      - DOCKER_CONFIG=/
      - DOCKER_API_VERSION=1.41
    command: --interval 30 --cleanup
    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  evolution_data:
  cliente_fotos:
  os_fotos:
  genieacs_mongo_data:
