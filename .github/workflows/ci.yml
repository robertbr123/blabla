name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api (lint + types + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ondeline
          POSTGRES_PASSWORD: ondeline
          POSTGRES_DB: ondeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ondeline"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate test secrets
        id: secrets
        run: |
          PII_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          echo "pii_key=$PII_KEY" >> $GITHUB_OUTPUT

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src tests

      - name: Alembic upgrade
        env:
          DATABASE_URL: postgresql+asyncpg://ondeline:ondeline@localhost:5432/ondeline
          REDIS_URL: redis://localhost:6379/0
          PII_ENCRYPTION_KEY: ${{ steps.secrets.outputs.pii_key }}
          PII_HASH_PEPPER: ci-pepper-not-for-prod-32-bytes-min
          JWT_SECRET: ci-jwt-secret-not-for-prod-32-bytes
        run: alembic upgrade head

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://ondeline:ondeline@localhost:5432/ondeline
          TEST_DATABASE_URL: postgresql+asyncpg://ondeline:ondeline@localhost:5432/ondeline
          REDIS_URL: redis://localhost:6379/0
          PII_ENCRYPTION_KEY: ${{ steps.secrets.outputs.pii_key }}
          PII_HASH_PEPPER: ci-pepper-not-for-prod-32-bytes-min
          JWT_SECRET: ci-jwt-secret-not-for-prod-32-bytes
        run: pytest -v
