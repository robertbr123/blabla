name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api (lint + types + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ondeline
          POSTGRES_PASSWORD: ondeline
          POSTGRES_DB: ondeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ondeline"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate test secrets
        id: secrets
        run: |
          PII_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          echo "pii_key=$PII_KEY" >> $GITHUB_OUTPUT

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src tests

      - name: Alembic upgrade
        env:
          DATABASE_URL: postgresql+asyncpg://ondeline:ondeline@localhost:5432/ondeline
          REDIS_URL: redis://localhost:6379/0
          PII_ENCRYPTION_KEY: ${{ steps.secrets.outputs.pii_key }}
          PII_HASH_PEPPER: ci-pepper-not-for-prod-32-bytes-min
          JWT_SECRET: ci-jwt-secret-not-for-prod-32-bytes
        run: alembic upgrade head

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://ondeline:ondeline@localhost:5432/ondeline
          TEST_DATABASE_URL: postgresql+asyncpg://ondeline:ondeline@localhost:5432/ondeline
          REDIS_URL: redis://localhost:6379/0
          PII_ENCRYPTION_KEY: ${{ steps.secrets.outputs.pii_key }}
          PII_HASH_PEPPER: ci-pepper-not-for-prod-32-bytes-min
          JWT_SECRET: ci-jwt-secret-not-for-prod-32-bytes
        run: pytest -v

  frontend:
    name: dashboard (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack + pnpm 9
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  pwa:
    name: tecnico-pwa (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/tecnico-pwa

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack + pnpm 9
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  mobile:
    name: tecnico-mobile (flutter analyze + test + build apk)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/tecnico-mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17 (Android build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Bootstrap nativos (Android/iOS gerados, não versionados)
        run: flutter create . --org br.com.ondeline --project-name tecnico_mobile --platforms=android

      - name: Pub get
        run: flutter pub get

      - name: Codegen (drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Build APK (debug)
        run: flutter build apk --debug --dart-define=API_URL=http://10.0.2.2:8000

      - name: Upload APK debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: tecnico-mobile-debug-apk
          path: apps/tecnico-mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      # ── Release signing (so roda em push pra main + se secrets configurados) ──
      - name: Decode keystore
        if: github.ref == 'refs/heads/main' && env.HAS_KEYSTORE == 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_B64 != '' }}
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_B64" | base64 -d > android/app/release.keystore
          cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Patch build.gradle pro signing config
        if: github.ref == 'refs/heads/main' && env.HAS_KEYSTORE == 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_B64 != '' }}
        run: |
          # Insere bloco signingConfigs.release + aponta release.signingConfig
          # no app-level build.gradle gerado pelo `flutter create`.
          GRADLE_FILE=android/app/build.gradle
          if [ ! -f "$GRADLE_FILE" ]; then
            GRADLE_FILE=android/app/build.gradle.kts
          fi
          python3 <<'PY'
          import re, pathlib
          for p in ['android/app/build.gradle', 'android/app/build.gradle.kts']:
              path = pathlib.Path(p)
              if not path.exists():
                  continue
              src = path.read_text()
              # Carrega key.properties no topo (se ainda nao tem).
              header = '''
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }
          '''.strip()
              if 'keystoreProperties' not in src:
                  src = header + "\n" + src
              # Adiciona signingConfigs antes de buildTypes.
              if 'signingConfigs' not in src:
                  signing = '''
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              }
              '''.rstrip()
                  src = re.sub(r'(\n\s*buildTypes\s*\{)', signing + r'\1', src, count=1)
              # Aponta release.signingConfig = release
              src = re.sub(
                  r'release\s*\{\s*\n\s*signingConfig\s+signingConfigs\.debug',
                  "release {\n            signingConfig signingConfigs.release",
                  src,
              )
              path.write_text(src)
              print('patched', p)
          PY

      - name: Build APK (release)
        if: github.ref == 'refs/heads/main' && env.HAS_KEYSTORE == 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_B64 != '' }}
          API_URL: ${{ secrets.MOBILE_API_URL || 'https://api.ondeline.dev' }}
        run: flutter build apk --release --dart-define=API_URL=$API_URL

      - name: Upload APK release artifact
        if: github.ref == 'refs/heads/main' && env.HAS_KEYSTORE == 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_B64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: tecnico-mobile-release-apk
          path: apps/tecnico-mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
